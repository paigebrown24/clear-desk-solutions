<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client List — Clear Desk Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #5B6B4F;
      --gold: #BB9B6E;
      --cream: #F7F4EF;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); padding: 40px; }
    h1 { font-family: 'Playfair Display', serif; color: var(--green); }
    p { color: #666; margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    th { background: var(--green); color: white; padding: 12px 16px; text-align: left; }
    td { padding: 12px 16px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f7f4; }
    .loading { color: #999; font-style: italic; }
    .error { color: red; }
    .add-form { margin-bottom: 32px; }
    .add-form h2 { font-family: 'Playfair Display', serif; color: var(--green); margin-bottom: 12px; }
    .add-form input { padding: 10px; margin: 4px; border: 1px solid #ccc; border-radius: 6px; }
    .add-form button { padding: 10px 24px; background: var(--gold); color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Client List</h1>
  <p>Connected to Supabase — Clear Desk Solutions</p>

  <div class="add-form">
    <h2>Add New Client</h2>
    <input type="text" id="new-email" placeholder="Email"/>
    <input type="text" id="new-phone" placeholder="Phone"/>
    <input type="text" id="new-notes" placeholder="Notes"/>
    <input type="date" id="new-date"/>
    <button onclick="addClient()">Add Client</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Phone</th>
        <th>Notes</th>
        <th>Last Contact</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="client-list">
      <tr><td colspan="5" class="loading">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    const SUPABASE_URL = 'https://kjfaunfetryaqsgchkrx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_8ExBijP4uUcoT1dbyEqylA_IriKQhlt';

    async function loadClients() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/clients?select=*`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await res.json();
        const tbody = document.getElementById('client-list');
        tbody.innerHTML = data.map(client => `
          <tr>
            <td>${client.email || '-'}</td>
            <td>${client.phone || '-'}</td>
            <td>${client.notes || '-'}</td>
            <td>${client.last_contact || '-'}</td>
            <td>
              <button onclick="editClient(${client.id}, '${client.email}', '${client.phone}', '${client.notes}', '${client.last_contact}')" style="background:var(--green);color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;margin-right:4px;">Edit</button>
              <button onclick="deleteClient(${client.id})" style="background:#c0392b;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('client-list').innerHTML = '<tr><td colspan="5" class="error">Error loading data.</td></tr>';
      }
    }

    async function addClient() {
      const email = document.getElementById('new-email').value;
      const phone = document.getElementById('new-phone').value;
      const notes = document.getElementById('new-notes').value;
      const last_contact = document.getElementById('new-date').value;
      await fetch(`${SUPABASE_URL}/rest/v1/clients`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ email, phone, notes, last_contact })
      });
      loadClients();
    }

    async function deleteClient(id) {
      if (!confirm('Are you sure you want to delete this client?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${id}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      loadClients();
    }

    async function editClient(id, email, phone, notes, last_contact) {
      const newEmail = prompt('Email:', email);
      const newPhone = prompt('Phone:', phone);
      const newNotes = prompt('Notes:', notes);
      const newDate = prompt('Last Contact (YYYY-MM-DD):', last_contact);
      await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: newEmail, phone: newPhone, notes: newNotes, last_contact: newDate })
      });
      loadClients();
    }

    loadClients();
  </script>
</body>
</html>
